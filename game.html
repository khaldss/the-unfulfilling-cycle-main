<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>Contact</title>
<link rel="stylesheet" type="text/css" href="game.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
	
	<body>
	 
		<div class="ripple"></div>
		<div id="cursor"></div>
		<div id="container">
            <a href="index.html"><img src="images/airforces-remove.png" alt="Galid Bered"></a>
</div>
	<script>	
document.addEventListener("mousemove", function(event) {
  var cursor = document.querySelector("#cursor");
  cursor.style.left = event.clientX + "px";
  cursor.style.top = event.clientY + "px";
});
		
		//Ripple Event Handler
var drawRipple = function(ev) {
  var x = ev.clientX;
  var y = ev.clientY;
  var node = document.querySelector(".ripple");
  var newNode = node.cloneNode(true);
  newNode.classList.add("animate");
  newNode.style.left = ev.clientX - 5 + "px";
  newNode.style.top = ev.clientY - 5 + "px";
  node.parentNode.replaceChild(newNode, node);
};

//Ripple Triggers
window.addEventListener("click", drawRipple);
		
	</script>
	</body>
</html>
